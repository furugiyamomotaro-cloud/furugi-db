import os
import glob
import json
import pandas as pd
from supabase import create_client

# 1. つながるための準備
url = os.environ.get("SUPABASE_URL")
key = os.environ.get("SUPABASE_KEY")
supabase = create_client(url, key)
TABLE_NAME = "m5x5_v106_raw_intelligence"

def upload_json_files():
    # 2. JSONファイルをぜんぶ探す
    json_files = glob.glob("mercari_*_data.json")
    
    if not json_files:
        print("ファイルが見つからないよ！")
        return

    for file_path in json_files:
        print(f"--- {file_path} を入れるよ！ ---")
        try:
            with open(file_path, 'r', encoding='utf-8') as f:
                data = json.load(f)
            
            # 3. データをきれいにならべる（ここが失敗の原因だったよ）
            df = pd.DataFrame(data)
            
            # もしデータが多すぎたら、少しずつ（100個ずつ）入れる
            total = len(df)
            for i in range(0, total, 100):
                batch = df.iloc[i:i+100].to_dict(orient='records')
                supabase.table(TABLE_NAME).upsert(batch).execute()
                print(f"進捗: {min(i+100, total)} / {total} 件完了！")

        except Exception as e:
            print(f"エラーになっちゃった: {e}")

if __name__ == "__main__":
    upload_json_files()
