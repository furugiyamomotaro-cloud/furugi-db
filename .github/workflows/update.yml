name: Update DB

on:
  workflow_dispatch: # 手動で動かすためのスイッチ

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # ←ここを v4 にしたよ（新しい道具）
      - uses: actions/setup-python@v5 # ←ここを v5 にしたよ（新しい道具）
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python upload_to_supabase.py
