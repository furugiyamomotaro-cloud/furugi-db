name: Update DB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 18

- name: Pythonセットアップ
  uses: actions/setup-python@v5
  with:
    python-version: '3.11'

- name: ライブラリインストール
  run: pip install requests supabase

- name: Python実行
  run: python upload_to_supabase.py
